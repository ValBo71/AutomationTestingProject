name: Playwright API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 04:00 UTC (07:00 Bulgarian Summer Time / 06:00 Winter Time) every day
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run API Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: "01.Playwright/04-automationexercise-api-csharp"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore AutomationExercise.ApiTests.sln

      - name: Build Solution
        run: dotnet build AutomationExercise.ApiTests.sln -c Release --no-restore

      - name: Run NUnit Tests
        run: dotnet test AutomationExercise.ApiTests.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload TRX Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-trx
          path: "01.Playwright/04-automationexercise-api-csharp/AutomationExercise.ApiTests/TestResults/test-results.trx"
          if-no-files-found: warn

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: "01.Playwright/04-automationexercise-api-csharp/AutomationExercise.ApiTests/bin/Release/net9.0/allure-results/"
          if-no-files-found: ignore
